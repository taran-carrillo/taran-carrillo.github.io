
<!DOCTYPE html>
<html lang="en">

<header>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6x6 Grid Layout</title>
</header>
<style>
    :root {
    --bg-color: #fcfaf7;
    --card-bg: #ffffff;
    --text-main: #2d3436;
    --text-muted: #a4b0be;
    --accent: #d4a373; /* Sophisticated gold/tan */
    --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background-color: var(--bg-color);
    font-family: 'Inter', sans-serif;
    color: var(--text-main);
    padding: 40px 20px;
    line-height: 1.6;
}

header {
    text-align: center;
    margin-bottom: 50px;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    margin-bottom: 10px;
}

.accent { color: var(--accent); }

.subheader {
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 0.8rem;
}

/* Grid System */
.grid-container {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-auto-rows: 180px;
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
}

/* Responsive Grid */
@media (max-width: 900px) { .grid-container { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 500px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }

/* Grid Card Styling */
.grid-item {
    position: relative;
    background: var(--card-bg);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.03);
}

.grid-item:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 12px 30px rgba(0,0,0,0.1);
}

.day-number {
    position: absolute;
    top: 15px;
    left: 15px;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-muted);
}

.entry-text {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-style: italic;
    display: -webkit-box;
    line-clamp: 3;
    -webkit-line-clamp: 3; /* Clips text after 3 lines */
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* Modal and Buttons */
.modal-content {
    border-radius: 24px;
    padding: 50px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}

textarea {
    border: 2px solid #eee;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    transition: border-color 0.3s;
}

textarea:focus { outline: none; border-color: var(--accent); }

.primary-btn {
    background: var(--accent);
    color: white;
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
}

.secondary-btn {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--text-muted);
    padding: 8px 16px;
    margin-top: 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.7rem;
}
</style>
<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro-Journal 6x6</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>The Daily <span class="accent">Archive</span></h1>
        <p class="subheader">Thirty-six days of micro-moments.</p>
        <button id="clear-btn" class="secondary-btn">Clear All Entries</button>
    </header>

    <main class="grid-container" id="journal-grid"></main>

    <div id="entry-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <div id="modal-body"></div>
            <div id="modal-form" style="display: none;">
                <textarea id="entry-input" placeholder="Capture your thought..."></textarea>
                <button id="save-btn" class="primary-btn">Save to Archive</button>
            </div>
        </div>
    </div>

    
</body>
</html>

    <script>
        // 1. DATA: Make sure this is at the very top
// Check LocalStorage first, otherwise default to an empty array
let journalEntries = JSON.parse(localStorage.getItem('myJournalData')) || [];

// 2. ELEMENTS: Make sure these IDs match your HTML exactly
const gridContainer = document.getElementById('journal-grid');
const modal = document.getElementById('entry-modal');
const modalBody = document.getElementById('modal-body');
const modalForm = document.getElementById('modal-form');
const entryInput = document.getElementById('entry-input');
const saveBtn = document.getElementById('save-btn');
const closeBtn = document.querySelector('.close-button');

let currentActiveDay = null;

// 3. RENDER FUNCTION: The "Artist" that draws the grid
function renderGrid() {
    if (!gridContainer) return; // Safety check
    gridContainer.innerHTML = ""; // Clear existing content
    
    for (let i = 1; i <= 36; i++) {
        const item = document.createElement('div');
        item.classList.add('grid-item');
        
        const entry = journalEntries.find(e => e.day === i);

        // Add Day Number
        const daySpan = document.createElement('span');
        daySpan.classList.add('day-number');
        daySpan.textContent = i.toString().padStart(2, '0');
        item.appendChild(daySpan);

        if (entry) {
            if (entry.type === "photo") {
                const img = document.createElement('img');
                img.src = entry.image;
                item.appendChild(img);
            } else {
                const p = document.createElement('p');
                p.classList.add('entry-text');
                p.textContent = entry.text;
                item.appendChild(p);
            }
        } else {
            item.classList.add('future-day');
        }

        // Click Event
        item.addEventListener('click', () => openEntry(entry, i));
        gridContainer.appendChild(item);
    }
}

// 4. MODAL LOGIC
function openEntry(entry, dayNumber) {
    modal.style.display = "block";
    currentActiveDay = dayNumber;

    if (entry) {
        modalForm.style.display = "none";
        modalBody.style.display = "block";
        let content = `<h2>Day ${dayNumber}</h2>`;
        content += (entry.type === 'photo') 
            ? `<img src="${entry.image}" class="modal-img">` 
            : `<p style="font-size: 1.2rem; margin-top: 20px;">${entry.text}</p>`;
        modalBody.innerHTML = content;
    } else {
        modalBody.innerHTML = `<h2>Day ${dayNumber}</h2><p>Write your entry:</p>`;
        modalForm.style.display = "block";
        entryInput.value = "";
    }
}


// 6. CLOSE LOGIC
closeBtn.onclick = () => modal.style.display = "none";
window.onclick = (event) => { if (event.target == modal) modal.style.display = "none"; }

// ... [Existing variables and renderGrid function] ...

// Add the Clear Logic
const clearBtn = document.getElementById('clear-btn');

clearBtn.onclick = () => {
    if (confirm("Are you sure you want to delete all entries? This cannot be undone.")) {
        journalEntries = [];
        localStorage.removeItem('myJournalData');
        renderGrid();
    }
};

// Update Save Logic to include better UX
saveBtn.onclick = () => {
    const text = entryInput.value.trim();
    if (text !== "") {
        journalEntries.push({
            day: currentActiveDay,
            text: text,
            type: "text"
        });
        localStorage.setItem('myJournalData', JSON.stringify(journalEntries));
        modal.style.display = "none";
        renderGrid();
    }
};

// START: Actually run the code
renderGrid();
    </script>
</body>
