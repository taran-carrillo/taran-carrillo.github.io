<!DOCTYPE html>
<html lang="en">

<header>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6x6 Grid Layout</title>
    <link rel="stylesheet" href="style.css">
</header>

<body>
    <header>
        <h1>The Daily Micro-Journal</h1>
        <p class="subheader">One small thought, thirty-six days at a time.</p>
    </header>

    <main class="grid-container">
        <div class="grid-item journal-entry">
            <span class="day-number">01</span>
            <p class="entry-text">Finally started the grid project. The code is clean and the layout is solid.</p>
        </div>

        <div class="grid-item photo-entry">
            <span class="day-number">02</span>
            <img src="https://placedog.net/500/500?id=1" alt="Daily Puppy">
        </div>

        <div class="grid-item journal-entry highlight">
            <span class="day-number">03</span>
            <p class="entry-text">Today I learned about Grid Spanning. This box is twice as wide now!</p>
        </div>

        <div class="grid-item future-day"><span class="day-number">04</span></div>
        <div class="grid-item future-day"><span class="day-number">05</span></div>
        <div class="grid-item future-day"><span class="day-number">06</span></div>
    </main>
</body>
