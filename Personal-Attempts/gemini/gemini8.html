
<!DOCTYPE html>
<html lang="en">

<header>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6x6 Grid Layout</title>
    <link rel="stylesheet" href="style.css">
</header>

<body>
    <header>
        <h1>The Daily Micro-Journal</h1>
        <p class="subheader">One small thought, thirty-six days at a time.</p>
    </header>

    <main class="grid-container" id="journal-grid"></main>
    <div id="entry-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <div id="modal-body">
            </div>
            <div id="modal-form" style="display: none;">
                <textarea id="entry-input" placeholder="What's on your mind?" rows="4"
                    style="width: 100%; margin-top: 15px; padding: 10px; border-radius: 8px; border: 1px solid #ccc;"></textarea>
                <button id="save-btn"
                    style="margin-top: 15px; padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">Save
                    Entry</button>
            </div>
        </div>
    </div>

    <script>
        // 1. DATA: Make sure this is at the very top
let journalEntries = [
    { day: 1, text: "The code is working again!", type: "text" },
    { day: 2, image: "https://placedog.net/500/500?id=1", type: "photo" }
    { day: 6, text: "Final project almost complete!", type: "text" }
];

// 2. ELEMENTS: Make sure these IDs match your HTML exactly
const gridContainer = document.getElementById('journal-grid');
const modal = document.getElementById('entry-modal');
const modalBody = document.getElementById('modal-body');
const modalForm = document.getElementById('modal-form');
const entryInput = document.getElementById('entry-input');
const saveBtn = document.getElementById('save-btn');
const closeBtn = document.querySelector('.close-button');

let currentActiveDay = null;

// 3. RENDER FUNCTION: The "Artist" that draws the grid
function renderGrid() {
    if (!gridContainer) return; // Safety check
    gridContainer.innerHTML = ""; // Clear existing content
    
    for (let i = 1; i <= 36; i++) {
        const item = document.createElement('div');
        item.classList.add('grid-item');
        
        const entry = journalEntries.find(e => e.day === i);

        // Add Day Number
        const daySpan = document.createElement('span');
        daySpan.classList.add('day-number');
        daySpan.textContent = i.toString().padStart(2, '0');
        item.appendChild(daySpan);

        if (entry) {
            if (entry.type === "photo") {
                const img = document.createElement('img');
                img.src = entry.image;
                item.appendChild(img);
            } else {
                const p = document.createElement('p');
                p.classList.add('entry-text');
                p.textContent = entry.text;
                item.appendChild(p);
            }
        } else {
            item.classList.add('future-day');
        }

        // Click Event
        item.addEventListener('click', () => openEntry(entry, i));
        gridContainer.appendChild(item);
    }
}

// 4. MODAL LOGIC
function openEntry(entry, dayNumber) {
    modal.style.display = "block";
    currentActiveDay = dayNumber;

    if (entry) {
        modalForm.style.display = "none";
        modalBody.style.display = "block";
        let content = `<h2>Day ${dayNumber}</h2>`;
        content += (entry.type === 'photo') 
            ? `<img src="${entry.image}" class="modal-img">` 
            : `<p style="font-size: 1.2rem; margin-top: 20px;">${entry.text}</p>`;
        modalBody.innerHTML = content;
    } else {
        modalBody.innerHTML = `<h2>Day ${dayNumber}</h2><p>Write your entry:</p>`;
        modalForm.style.display = "block";
        entryInput.value = "";
    }
}

// 5. SAVE LOGIC
saveBtn.onclick = () => {
    if (entryInput.value.trim() !== "") {
        journalEntries.push({
            day: currentActiveDay,
            text: entryInput.value,
            type: "text"
        });

        // NEW: Save the updated array to LocalStorage
        localStorage.setItem('myJournalData', JSON.stringify(journalEntries));

        modal.style.display = "none";
        renderGrid();
    }
};

// 6. CLOSE LOGIC
closeBtn.onclick = () => modal.style.display = "none";
window.onclick = (event) => { if (event.target == modal) modal.style.display = "none"; }

// START: Actually run the code
renderGrid();
    </script>
</body>
