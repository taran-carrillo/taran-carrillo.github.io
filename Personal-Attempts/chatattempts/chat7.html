<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match Game</title>

<style>

/* Reset & base */

body{
    margin:0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    color:white;
    text-align:center;
}

/* Header */

header{
    padding:25px 10px 10px;
}

header h1{
    margin:0;
    font-size:2.2rem;
    letter-spacing:1px;
}

/* Subheader */

.subheader{
    color:#cbd5f5;
    margin-bottom:10px;
}

/* Game info */

#game-info{
    margin:10px;
    font-size:18px;
}

/* Button */

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#6366f1;
    color:white;
    font-size:14px;
    cursor:pointer;
    transition: all 0.2s ease;
}

button:hover{
    background:#4f46e5;
    transform: translateY(-2px);
}

/* Grid */

.grid-container{
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(6, 100px);
    gap:12px;
    padding:20px;
    max-width:800px;
    margin:20px auto;
}

/* Tile */

.grid-item{
    perspective:1000px;
}

/* Card */

.card{
    width:100%;
    height:100%;
    position:relative;
    transform-style: preserve-3d;
    transition: transform 0.5s ease;
    border-radius:12px;
}

/* Flip */

.card.flipped{
    transform: rotateY(180deg);
}

/* Faces */

.card-face{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    backface-visibility:hidden;
    overflow:hidden;
}

/* Front (hidden) */

.card-front{
    background: linear-gradient(145deg, #334155, #1e293b);
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    cursor:pointer;
    transition: transform 0.2s ease;
}

.card-front:hover{
    transform: scale(1.05);
}

/* Back (image side) */

.card-back{
    background:#111827;
    transform: rotateY(180deg);
}

.card-back img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Match animation */

@keyframes matchPop {
    0%   { transform: rotateY(180deg) scale(1); }
    50%  { transform: rotateY(180deg) scale(1.15); }
    100% { transform: rotateY(180deg) scale(1); }
}

/* Matching (temporary animation) */

.card.matching{
    animation: matchPop 0.3s ease;
}

/* Matched (final state) */

.card.matched{
    transform: rotateY(180deg);
    box-shadow: 0 0 12px 4px #22c55e;
    border: 2px solid #22c55e;
    pointer-events:none;
}

/* Wrong match feedback (optional but nice) */

@keyframes shake {
    0% { transform: translateX(0) rotateY(180deg); }
    25% { transform: translateX(-5px) rotateY(180deg); }
    50% { transform: translateX(5px) rotateY(180deg); }
    75% { transform: translateX(-5px) rotateY(180deg); }
    100% { transform: translateX(0) rotateY(180deg); }
}

.card.wrong{
    animation: shake 0.3s;
}

/* Responsive (important for smaller screens) */

@media (max-width: 700px){
    .grid-container{
        grid-template-rows: repeat(6, 70px);
        gap:8px;
    }
}
</style>
</head>

<body>

<header>
    <h1>Memory Match</h1>
</header>

<div class="subheader">
    Flip cards and match all the pairs!
</div>

<div id="game-info">
    Matches: <span id="score">0</span> / 18
</div>

<button onclick="startGame()">Restart Game</button>

<div class="grid-container" id="grid"></div>

<!-- Sounds -->
<audio id="flipSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="matchSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>

const GRID_SIZE = 36;
const PAIRS = 18;

let firstCard = null;
let secondCard = null;
let lockBoard = false;
let matches = 0;

// Distinct images (clear differences)
const images = [
    {src:"https://picsum.photos/id/1015/200", alt:"Mountain landscape"},
    {src:"https://picsum.photos/id/1025/200", alt:"Golden retriever dog"},
    {src:"https://picsum.photos/id/1035/200", alt:"Forest trees"},
    {src:"https://picsum.photos/id/1045/200", alt:"Desert dunes"},
    {src:"https://picsum.photos/id/1055/200", alt:"Ocean waves"},
    {src:"https://picsum.photos/id/1065/200", alt:"Snowy mountains"},
    {src:"https://picsum.photos/id/1075/200", alt:"City skyline"},
    {src:"https://picsum.photos/id/1085/200", alt:"Bridge at sunset"},
    {src:"https://picsum.photos/id/1095/200", alt:"River valley"},
    {src:"https://picsum.photos/id/110/200", alt:"Flowers close-up"},
    {src:"https://picsum.photos/id/111/200", alt:"Beach sand"},
    {src:"https://picsum.photos/id/112/200", alt:"Foggy forest"},
    {src:"https://picsum.photos/id/113/200", alt:"Road in countryside"},
    {src:"https://picsum.photos/id/114/200", alt:"Waterfall"},
    {src:"https://picsum.photos/id/115/200", alt:"Night sky stars"},
    {src:"https://picsum.photos/id/116/200", alt:"Cliffside view"},
    {src:"https://picsum.photos/id/117/200", alt:"Lake reflection"},
    {src:"https://picsum.photos/id/118/200", alt:"Autumn leaves"}
];

// Duplicate and shuffle
function generateCards(){
    let cardData = [...images, ...images];

    cardData.sort(() => Math.random() - 0.5);

    return cardData;
}

// Create grid
function createGrid(){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const cards = generateCards();

    cards.forEach((data, index) => {

        const cell = document.createElement("div");
        cell.classList.add("grid-item");

        const card = document.createElement("div");
        card.classList.add("card");
        card.dataset.index = index;
        card.dataset.image = data.src;

        const front = document.createElement("div");
        front.classList.add("card-face", "card-front");

        const back = document.createElement("div");
        back.classList.add("card-face", "card-back");
        back.innerHTML = `<img src="${data.src}" alt="${data.alt}">`;

        card.appendChild(front);
        card.appendChild(back);
        cell.appendChild(card);

        card.addEventListener("click", handleClick);

        grid.appendChild(cell);
    });
}

// Handle click
function handleClick(e){
    const card = e.currentTarget;

    if(lockBoard) return;
    if(card === firstCard) return;
    if(card.classList.contains("matched")) return;

    playSound("flipSound");

    card.classList.add("flipped");

    if(!firstCard){
        firstCard = card;
        return;
    }

    secondCard = card;
    lockBoard = true;

    checkMatch();
}

function checkMatch(){
    const isMatch = firstCard.dataset.image === secondCard.dataset.image;

    if(isMatch){

    firstCard.classList.add("matching");
    secondCard.classList.add("matching");

    playSound("matchSound");

    setTimeout(() => {
        firstCard.classList.remove("matching");
        secondCard.classList.remove("matching");

        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        matches++;
        document.getElementById("score").textContent = matches;

        resetTurn();

        if(matches === PAIRS){
            setTimeout(() => alert("You won! 🎉"), 300);
        }

    }, 300);



    } else {
        playSound("wrongSound");

        setTimeout(() => {
            firstCard.classList.remove("flipped");
            secondCard.classList.remove("flipped");
            resetTurn();
        }, 800);
    }
}

function resetTurn(){
    [firstCard, secondCard] = [null, null];
    lockBoard = false;
}

// Sounds
function playSound(id){
    const sound = document.getElementById(id);
    sound.currentTime = 0;
    sound.play();
}

// Start game
function startGame(){
    matches = 0;
    document.getElementById("score").textContent = matches;
    createGrid();
}

// Init
startGame();

</script>

</body>
</html>
