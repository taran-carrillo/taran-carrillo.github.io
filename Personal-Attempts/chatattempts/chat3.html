<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find the Puppies Game</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    text-align:center;
}

header{
    background:#222;
    color:white;
    padding:20px;
}

.subheader{
    background:#444;
    color:white;
    padding:10px;
}

#game-info{
    margin:10px;
    font-size:18px;
}

button{
    padding:8px 16px;
    margin-top:10px;
    cursor:pointer;
}

/* Grid */

.grid-container{
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(6, 100px);
    gap:10px;
    padding:20px;
    max-width:800px;
    margin:auto;
}

/* Flip Card Structure */

.grid-item{
    perspective: 1000px;
}

.card{
    width:100%;
    height:100%;
    position:relative;
    transform-style: preserve-3d;
    transition: transform 0.5s;
}

.card.flipped{
    transform: rotateY(180deg);
}

.card-face{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    border:1px solid #aaa;
    backface-visibility: hidden;
    overflow:hidden;
}

/* Front (hidden side) */
.card-front{
    background:#ddd;
}

/* Back (revealed side) */
.card-back{
    background:white;
    transform: rotateY(180deg);
}

.card-back img{
    width:100%;
    height:100%;
    object-fit:cover;
}

</style>
</head>

<body>

<header>
    <h1>Find the Puppies</h1>
</header>

<div class="subheader">
    Click tiles to find all the hidden puppies!
</div>

<div id="game-info">
    Puppies found: <span id="score">0</span> / 5
</div>

<button onclick="startGame()">Restart Game</button>

<div class="grid-container" id="grid"></div>

<script>

const GRID_SIZE = 36;
const PUPPIES = 5;

let puppyPositions = [];
let score = 0;

// Create grid
function createGrid(){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    for(let i = 0; i < GRID_SIZE; i++){

        const cell = document.createElement("div");
        cell.classList.add("grid-item");

        const card = document.createElement("div");
        card.classList.add("card");
        card.dataset.index = i;

        const front = document.createElement("div");
        front.classList.add("card-face", "card-front");

        const back = document.createElement("div");
        back.classList.add("card-face", "card-back");

        card.appendChild(front);
        card.appendChild(back);
        cell.appendChild(card);

        card.addEventListener("click", handleClick);

        grid.appendChild(cell);
    }
}

// Random puppy placement
function placePuppies(){
    puppyPositions = [];

    while(puppyPositions.length < PUPPIES){
        let rand = Math.floor(Math.random() * GRID_SIZE);
        if(!puppyPositions.includes(rand)){
            puppyPositions.push(rand);
        }
    }
}

// Handle click
function handleClick(e){
    const card = e.currentTarget;
    const index = Number(card.dataset.index);

    if(card.classList.contains("flipped")) return;

    const back = card.querySelector(".card-back");

    if(puppyPositions.includes(index)){
        back.innerHTML = `<img src="https://place-puppy.com/200x200">`;
        score++;
        document.getElementById("score").textContent = score;

        if(score === PUPPIES){
            setTimeout(() => {
                alert("You found all the puppies! 🐶");
            }, 300);
        }

    } else {
        back.textContent = "❌";
    }

    card.classList.add("flipped");
}

// Start/reset game
function startGame(){
    score = 0;
    document.getElementById("score").textContent = score;

    createGrid();
    placePuppies();
}

// Initialize
startGame();

</script>

</body>
</html>
