<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find the Puppies Game</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    text-align:center;
}

header{
    background:#222;
    color:white;
    padding:20px;
}

.subheader{
    background:#444;
    color:white;
    padding:10px;
}

#game-info{
    margin:10px;
    font-size:18px;
}

button{
    padding:8px 16px;
    margin-top:10px;
    cursor:pointer;
}

/* Grid */

.grid-container{
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(6, 100px);
    gap:10px;
    padding:20px;
    max-width:800px;
    margin:auto;
}

.grid-item{
    background:#ddd;
    border:1px solid #aaa;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    overflow:hidden;
    font-size:14px;
}

.grid-item.revealed{
    background:white;
}

.grid-item img{
    width:100%;
    height:100%;
    object-fit:cover;
}

</style>
</head>

<body>

<header>
    <h1>Find the Puppies</h1>
</header>

<div class="subheader">
    Click tiles to find all the hidden puppies!
</div>

<div id="game-info">
    Puppies found: <span id="score">0</span> / 5
</div>

<button onclick="startGame()">Restart Game</button>

<div class="grid-container" id="grid"></div>

<script>

const GRID_SIZE = 36;
const PUPPIES = 5;

let puppyPositions = [];
let score = 0;

// Create grid
function createGrid(){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    for(let i = 0; i < GRID_SIZE; i++){
        const cell = document.createElement("div");
        cell.classList.add("grid-item");
        cell.dataset.index = i;

        cell.addEventListener("click", handleClick);

        grid.appendChild(cell);
    }
}

// Random puppy placement
function placePuppies(){
    puppyPositions = [];

    while(puppyPositions.length < PUPPIES){
        let rand = Math.floor(Math.random() * GRID_SIZE);
        if(!puppyPositions.includes(rand)){
            puppyPositions.push(rand);
        }
    }
}

// Handle click
function handleClick(e){
    const cell = e.currentTarget;
    const index = Number(cell.dataset.index);

    if(cell.classList.contains("revealed")) return;

    cell.classList.add("revealed");

    if(puppyPositions.includes(index)){
        // Puppy found
        cell.innerHTML = `<img src="https://place-puppy.com/200x200">`;
        score++;
        document.getElementById("score").textContent = score;

        if(score === PUPPIES){
            setTimeout(() => {
                alert("You found all the puppies! 🐶");
            }, 100);
        }

    } else {
        cell.textContent = "❌";
    }
}

// Start/reset game
function startGame(){
    score = 0;
    document.getElementById("score").textContent = score;

    createGrid();
    placePuppies();
}

// Initialize game
startGame();

</script>

</body>
</html>
