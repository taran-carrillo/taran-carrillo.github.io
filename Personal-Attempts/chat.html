<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Demo</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f2f2f2;
}

/* Header styling */

header{
    background:#222;
    color:white;
    text-align:center;
    padding:30px;
}

.subheader{
    text-align:center;
    padding:15px;
    background:#444;
    color:white;
}

/* Grid container */

.grid-container{
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(6, 120px);
    gap:10px;
    padding:20px;
}

/* Grid items */

.grid-item{
    background:white;
    border:1px solid #ccc;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:14px;
}

</style>
</head>

<body>

<header>
    <h1>Galactic Pancake Observatory</h1>
</header>

<div class="subheader">
    <p>Whispering llamas calculate the geometry of toast.</p>
</div>

<div class="grid-container">

<div class="grid-item">1</div>
<div class="grid-item">2</div>
<div class="grid-item">3</div>
<div class="grid-item">4</div>
<div class="grid-item">5</div>
<div class="grid-item">6</div>

<div class="grid-item">7</div>
<div class="grid-item">8</div>
<div class="grid-item">9</div>
<div class="grid-item">10</div>
<div class="grid-item">11</div>
<div class="grid-item">12</div>

<div class="grid-item">13</div>
<div class="grid-item">14</div>
<div class="grid-item">15</div>
<div class="grid-item">16</div>
<div class="grid-item">17</div>
<div class="grid-item">18</div>

<div class="grid-item">19</div>
<div class="grid-item">20</div>
<div class="grid-item">21</div>
<div class="grid-item">22</div>
<div class="grid-item">23</div>
<div class="grid-item">24</div>

<div class="grid-item">25</div>
<div class="grid-item">26</div>
<div class="grid-item">27</div>
<div class="grid-item">28</div>
<div class="grid-item">29</div>
<div class="grid-item">30</div>

<div class="grid-item">31</div>
<div class="grid-item">32</div>
<div class="grid-item">33</div>
<div class="grid-item">34</div>
<div class="grid-item">35</div>
<div class="grid-item">36</div>

</div>

</body>
</html>
